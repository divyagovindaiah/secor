# log4j2 logging configuration.

rootLogger.level = INFO
rootLogger.appenderRef.console.ref = CONSOLE

appender.console.type = Console
appender.console.name = CONSOLE
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{ISO8601} [%t] (%c) %-5p %m%n

# Dont want to be bothered about hadoop saying "Im using compression" every time we upload a file
logger.hadoop-codec.name = org.apache.hadoop.io.compress.CodecPool
logger.hadoop-codec.level = WARN

logger.gs-upload.name = com.pinterest.secor.uploader.GsUploadManager
logger.gs-upload.level = DEBUG
